<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./app.js" defer></script>
    <title>CharVault</title>
</head>
<body>
    <header>
        <h1>CharVault</h1>
    </header>
    <main>
        <img src="./img/Fundo Personalizado.svg" alt="">
        <h2>Buscar Personagem</h2>
        <div>
            <input type="text">
            <button>BUSCAR</button>
        </div>
        <h3>Conhecer Personagens</h3>
        <div class="personagens">
            <div class="personagem">
                <img src="./img/foto-batman.jpg" alt="imagem-personagem">
                <p class="name">Batman</p>
                <p class="publisher">DC Comics</p>
            </div>
        </div>
    </main>
    <footer>
        <p>© 2026 Lucas Kolle — CharVault<br>Catálogo de heróis e vilões • Projeto independente</p>
    </footer>
    
</body>
</html>
